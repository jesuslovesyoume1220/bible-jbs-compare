<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>聖書協会共同訳 対照</title>

<link rel="icon" type="image/png" href="/static/icons/icon-256.png">
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#16213e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="聖書対照">
<link rel="apple-touch-icon" href="/static/icons/icon-180.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  body {
    font-family: "Yu Gothic", "游ゴシック", "Hiragino Kaku Gothic ProN", sans-serif;
    background: #1a1a2e;
    color: #e0e0e8;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── ヘッダー ── */
  header {
    background: #1565c0;
    border-bottom: 2px solid #0d47a1;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  header h1 { font-size: 18px; font-weight: 600; color: #ffffff; white-space: nowrap; }

  .status-bar { font-size: 12px; color: #5d8aa8; margin-left: 2px; }
  .status-bar.ok { color: #4caf50; }
  .status-bar.ng { color: #f44336; }

  button {
    background: #1a5276; color: #fff; border: none; border-radius: 6px;
    padding: 7px 14px; font-size: 14px; font-family: inherit;
    cursor: pointer; transition: background 0.15s; white-space: nowrap;
  }
  button:hover { background: #2874a6; }

  .btn-login-header {
    background: #ffffff; color: #1565c0;
    border: 1px solid #90caf9; padding: 5px 12px; font-size: 13px;
  }
  .btn-login-header:hover { background: #e3f2fd; }

  /* ── パネル ── */
  .panels { display: flex; flex: 1; overflow: hidden; gap: 2px; background: #0f3460; }

  .panel-wrapper {
    flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0;
  }

  .panel-header {
    background: #16213e; padding: 6px 10px;
    display: flex; align-items: center; gap: 6px;
    border-bottom: 1px solid #0f3460; flex-shrink: 0; flex-wrap: wrap;
  }

  select {
    background: #0f3460; color: #e0e0e8;
    border: 1px solid #1a5276; border-radius: 6px;
    padding: 5px 8px; font-size: 13px; font-family: inherit; cursor: pointer; outline: none;
  }
  select:hover { border-color: #7eb8f7; }

  .btn-nav {
    background: #0f3460; color: #e0e0e8; padding: 5px 10px;
    font-size: 16px; border: 1px solid #1a5276; border-radius: 6px;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-nav:hover { background: #1a5276; }

  .btn-play {
    background: #0f3460; color: #7eb8f7;
    border: 1px solid #1a5276; border-radius: 5px;
    padding: 4px 10px; font-size: 13px; cursor: pointer;
    transition: background 0.15s; white-space: nowrap; flex-shrink: 0;
    margin-left: auto;
  }
  .btn-play:hover { background: #1a5276; }
  .btn-play.playing { background: #4a1515; color: #ff8888; border-color: #8b3333; }
  .btn-play.playing:hover { background: #5c1a1a; }

  /* ── 本文 ── */
  .panel-body {
    flex: 1; overflow-y: auto;
    background: #ffffff; color: #1a1a1a;
    padding: 18px 22px 36px; line-height: 2.0; font-size: var(--body-fs, 15px);
  }

  /* ── 読み上げ中の節ハイライト ── */
  .tts-active { background: #fff3c4; border-radius: 4px; }

  /* ── 節検索 ── */
  .ref-search {
    background: #ffffff; color: #1a1a1a;
    border: 1px solid #90caf9; border-radius: 6px;
    padding: 4px 8px; font-size: 13px; font-family: inherit;
    width: 120px; outline: none;
  }
  .ref-search:focus { border-color: #1565c0; }
  .panel-body::-webkit-scrollbar { width: 6px; }
  .panel-body::-webkit-scrollbar-track { background: #f0f0f0; }
  .panel-body::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 3px; }
  .panel-body::-webkit-scrollbar-thumb:hover { background: #a0a0a0; }

  /* ── テキスト ── */
  .chapter-title {
    font-size: 17px; font-weight: 700; color: #1a3a6e;
    margin-bottom: 14px; padding-bottom: 8px;
    border-bottom: 2px solid #d0dce8;
  }
  .ver-badge {
    display: inline-block; font-size: 11px; font-weight: 400;
    color: #7eb8f7; background: #1a3a6e; border-radius: 4px;
    padding: 1px 6px; margin-left: 8px; vertical-align: middle;
  }
  .verse-para { margin-bottom: 8px; text-indent: 1em; line-height: 1.9; }
  .verse-num {
    font-size: 10px; font-weight: 700; color: #bbb;
    vertical-align: super; margin: 0 2px; line-height: 1;
  }
  .section-heading {
    font-size: 13px; font-weight: 700; color: #1a5276;
    margin: 14px 0 6px; padding-left: 8px; border-left: 3px solid #7eb8f7;
  }

  .loading { text-align: center; padding: 40px; color: #888888; font-size: 14px; }

  .need-login {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; gap: 14px; padding: 30px; text-align: center;
  }
  .need-login h3 { color: #1a5276; font-size: 16px; }
  .need-login p { color: #555555; font-size: 13px; line-height: 1.7; }
  .need-login button { background: #1a5276; padding: 10px 28px; font-size: 15px; }

  /* ── ログインオーバーレイ ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.65); z-index: 100;
    align-items: center; justify-content: center;
  }
  .overlay.open { display: flex; }

  .login-panel {
    background: #16213e; border: 1px solid #1a5276; border-radius: 12px;
    padding: 28px 32px; width: min(420px, 90vw);
  }
  .login-panel h2 { color: #7eb8f7; font-size: 17px; margin-bottom: 20px; }

  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: #8aabca; margin-bottom: 5px; }
  .form-group input {
    width: 100%; background: #0f3460; color: #e0e0e8;
    border: 1px solid #1a5276; border-radius: 6px;
    padding: 9px 12px; font-size: 14px; font-family: inherit; outline: none;
  }
  .form-group input:focus { border-color: #7eb8f7; }

  .btn-row { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .btn-cancel { background: #0f3460; }

  .login-error {
    background: #2c1a1a; border: 1px solid #5c2a2a; border-radius: 6px;
    padding: 10px 14px; margin-top: 12px; font-size: 13px; color: #e07070; display: none;
  }
  .login-success {
    background: #1a2c1a; border: 1px solid #2a5c2a; border-radius: 6px;
    padding: 10px 14px; margin-top: 12px; font-size: 13px; color: #70e070; display: none;
  }

  /* ── コピー完了トースト ── */
  #copyToast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: #1a3a6e; color: #c8e0ff; border: 1px solid #7eb8f7;
    border-radius: 8px; padding: 9px 22px; font-size: 13px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
    z-index: 200; white-space: nowrap;
  }
  #copyToast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1><img src="/static/icons/icon-256.png" style="height:22px;width:22px;vertical-align:middle;margin-right:6px;border-radius:4px;"> 聖書協会共同訳</h1>
  <div style="display:flex;align-items:center;gap:6px;">
    <span id="statusBar" class="status-bar">確認中…</span>
    <button class="btn-login-header" id="btnLoginHeader" onclick="openLogin()">🔑 ログイン</button>
    <button class="btn-login-header" id="btnLogout" onclick="doLogout()" style="display:none;color:#c62828;border-color:#ef9a9a;">ログアウト</button>
  </div>
  <span style="position:absolute;left:50%;transform:translateX(-50%);font-size:12px;color:#ffffff;white-space:nowrap;pointer-events:none;">節番号なしでコピー　→　CMD+B</span>
  <div style="margin-left:auto;display:flex;align-items:center;gap:6px;">
    <button class="btn-login-header" onclick="adjustFont(-1)" style="font-size:12px;" title="文字を小さく">A−</button>
    <button class="btn-login-header" onclick="adjustFont(1)" style="font-size:15px;" title="文字を大きく">A＋</button>
  </div>
</header>

<div class="panels">

  <!-- 左パネル -->
  <div class="panel-wrapper">
    <div class="panel-header">
      <select id="bookSelL" onchange="onBookChangeL()">
        {% for b in books %}
        <option value="{{ b.id }}" {% if b.id == 'MAT' %}selected{% endif %}>{{ b.name }}</option>
        {% endfor %}
      </select>
      <select id="chapSelL" onchange="loadLeft()"></select>
      <button class="btn-nav" onclick="navL(-1)">◀</button>
      <button class="btn-nav" onclick="navL(1)">▶</button>
      <input class="ref-search" id="refSearchL" placeholder="例: ヨハネ3:16" onkeydown="if(event.key==='Enter') goToRef('L')">
      <button class="btn-nav" onclick="goToRef('L')" style="font-size:13px;">移動</button>
      <button class="btn-play" id="btnPlayL" onclick="togglePlay('L')">▶ 読む</button>
    </div>
    <div class="panel-body" id="panelL">
      <div class="loading">読み込み中…</div>
    </div>
  </div>

  <!-- 右パネル -->
  <div class="panel-wrapper">
    <div class="panel-header">
      <select id="bookSelR" onchange="onBookChangeR()">
        {% for b in books %}
        <option value="{{ b.id }}" {% if b.id == 'MAT' %}selected{% endif %}>{{ b.name }}</option>
        {% endfor %}
      </select>
      <select id="chapSelR" onchange="loadRight()"></select>
      <button class="btn-nav" onclick="navR(-1)">◀</button>
      <button class="btn-nav" onclick="navR(1)">▶</button>
      <input class="ref-search" id="refSearchR" placeholder="例: ヨハネ3:16" onkeydown="if(event.key==='Enter') goToRef('R')">
      <button class="btn-nav" onclick="goToRef('R')" style="font-size:13px;">移動</button>
      <button class="btn-play" id="btnPlayR" onclick="togglePlay('R')">▶ 読む</button>
    </div>
    <div class="panel-body" id="panelR">
      <div class="loading">読み込み中…</div>
    </div>
  </div>

</div>

<!-- コピー完了トースト -->
<div id="copyToast">✓ 節番号なしでコピーしました</div>

<!-- ログインオーバーレイ -->
<div class="overlay" id="overlay" onclick="closeBgClick(event)">
  <div class="login-panel">
    <h2 id="loginTitle">🔑 聖書協会共同訳 ログイン</h2>
    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" id="loginEmail" placeholder="example@gmail.com" autocomplete="username">
    </div>
    <div class="form-group">
      <label>パスワード</label>
      <input type="password" id="loginPassword" placeholder="パスワード" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <div style="margin-top:8px;">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#8aabca;cursor:pointer;">
        <input type="checkbox" id="rememberMe" checked style="width:16px;height:16px;cursor:pointer;">
        次回から自動ログイン
      </label>
    </div>
    <div class="login-error" id="loginError"></div>
    <div class="login-success" id="loginSuccess">ログインしました！</div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeLogin()">キャンセル</button>
      <button id="btnDoLogin" onclick="doLogin()">ログイン</button>
    </div>
  </div>
</div>

<script>
const BOOKS = {{ books | tojson }};
const BOOK_MAP = {};
BOOKS.forEach(b => BOOK_MAP[b.id] = b);

let isLoggedIn = false;
let ttsPlaying = null; // 'L' | 'R' | null

// ── 章セレクト構築 ──
function buildChapterSelect(selId, bookId, ch = 1) {
  const sel = document.getElementById(selId);
  const book = BOOK_MAP[bookId];
  sel.innerHTML = '';
  for (let i = 1; i <= book.chapters; i++) {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = `${i}章`;
    if (i === ch) opt.selected = true;
    sel.appendChild(opt);
  }
}

function onBookChangeL() {
  const book = document.getElementById('bookSelL').value;
  buildChapterSelect('chapSelL', book, 1);
  loadLeft();
}

function onBookChangeR() {
  const book = document.getElementById('bookSelR').value;
  buildChapterSelect('chapSelR', book, 1);
  loadRight();
}

// ── 前後移動 ──
function navL(dir) {
  const bookId = document.getElementById('bookSelL').value;
  const book = BOOK_MAP[bookId];
  const chapSel = document.getElementById('chapSelL');
  let ch = parseInt(chapSel.value) + dir;
  ch = Math.max(1, Math.min(ch, book.chapters));
  chapSel.value = ch;
  loadLeft();
}

function navR(dir) {
  const bookId = document.getElementById('bookSelR').value;
  const book = BOOK_MAP[bookId];
  const chapSel = document.getElementById('chapSelR');
  let ch = parseInt(chapSel.value) + dir;
  ch = Math.max(1, Math.min(ch, book.chapters));
  chapSel.value = ch;
  loadRight();
}

// ── データ読み込み ──
async function loadLeft() {
  stopTTS();
  savePosition();
  const book    = document.getElementById('bookSelL').value;
  const chapter = document.getElementById('chapSelL').value;
  document.getElementById('panelL').innerHTML = '<div class="loading">読み込み中…</div>';
  const data = await fetchChapter(book, chapter);
  renderPanel('panelL', data);
  document.getElementById('panelL').scrollTop = 0;
}

async function loadRight() {
  stopTTS();
  savePosition();
  const book    = document.getElementById('bookSelR').value;
  const chapter = document.getElementById('chapSelR').value;
  document.getElementById('panelR').innerHTML = '<div class="loading">読み込み中…</div>';
  const data = await fetchChapter(book, chapter);
  renderPanel('panelR', data);
  document.getElementById('panelR').scrollTop = 0;
}

async function fetchChapter(book, chapter) {
  try {
    const res = await fetch(`/api/chapter?book=${book}&chapter=${chapter}`);
    return await res.json();
  } catch(e) {
    return { error: e.message, items: [], count: 0 };
  }
}

// ── 描画 ──
function renderPanel(panelId, data) {
  const panel = document.getElementById(panelId);

  if (data.error === 'not_logged_in') {
    panel.innerHTML = `
      <div class="need-login">
        <h3>🔑 ログインが必要です</h3>
        <p>右上の「ログイン」ボタンから<br>jbsbibleapp.com のアカウントでログインしてください</p>
        <button onclick="openLogin()">ログインする</button>
      </div>`;
    return;
  }

  if (data.error) {
    panel.innerHTML = `<div class="loading" style="color:#cc4444">エラー: ${esc(data.error)}</div>`;
    return;
  }

  if (!data.items || data.items.length === 0) {
    panel.innerHTML = `<div class="loading">テキストが見つかりませんでした</div>`;
    return;
  }

  let html = `<div class="chapter-title">${esc(data.title || '')}</div>`;

  let lastShownNum = -1;
  data.items.forEach(item => {
    if (item.type === 'heading') {
      html += `<div class="section-heading">${esc(item.text)}</div>`;
    } else if (item.type === 'para' && item.lines) {
      item.lines.forEach(line => {
        let lineHtml = '';
        if (line.parts && line.parts.length > 0) {
          line.parts.forEach(part => {
            const num = part[0], text = part[1];
            if (num !== lastShownNum) {
              lineHtml += `<sup class="verse-num">${num}</sup>`;
              lastShownNum = num;
            }
            lineHtml += esc(text) + ' ';
          });
        } else {
          if (line.num !== lastShownNum) {
            lineHtml = `<sup class="verse-num">${line.num}</sup>`;
            lastShownNum = line.num;
          }
          lineHtml += esc(line.text || '');
        }
        html += `<p class="verse-para">${lineHtml.trim()}</p>`;
      });
    } else if (item.type === 'verse') {
      html += `<p class="verse-para"><sup class="verse-num">${item.num}</sup>${esc(item.text)}</p>`;
    }
  });

  panel.innerHTML = html;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 音声読み上げ（節単位で読み、読んでいる節をハイライト）──
function togglePlay(side) {
  const panelId = side === 'L' ? 'panelL' : 'panelR';
  const btnId   = side === 'L' ? 'btnPlayL' : 'btnPlayR';
  const btn     = document.getElementById(btnId);

  if (ttsPlaying === side) { stopTTS(); return; }

  stopTTS();

  const panel = document.getElementById(panelId);
  const paras = [...panel.querySelectorAll('.verse-para')];
  if (paras.length === 0) return;

  const voices = window.speechSynthesis.getVoices();
  const jaVoice = voices.find(v => v.lang.startsWith('ja'));

  ttsPlaying = side;
  btn.textContent = '■ 停止';
  btn.classList.add('playing');

  let idx = 0;
  const speakNext = () => {
    if (ttsPlaying !== side) return;   // 停止済み
    if (idx >= paras.length) { stopTTS(); return; }  // 読み終わり

    const p = paras[idx];
    idx++;

    // 節番号を除いたテキストを取得
    let t = '';
    p.childNodes.forEach(node => {
      if (node.tagName === 'SUP') return;
      t += node.textContent;
    });
    t = t.trim();
    if (!t) { speakNext(); return; }

    // 読んでいる節をハイライトしてスクロール
    panel.querySelectorAll('.tts-active').forEach(el => el.classList.remove('tts-active'));
    p.classList.add('tts-active');
    const rect = p.getBoundingClientRect();
    const prect = panel.getBoundingClientRect();
    panel.scrollTop += rect.top - prect.top - panel.clientHeight / 3;

    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'ja-JP';
    u.rate = 0.95;
    u.pitch = 1.0;
    if (jaVoice) u.voice = jaVoice;
    u.onend = speakNext;
    u.onerror = speakNext;
    window.speechSynthesis.speak(u);
  };
  speakNext();
}

function stopTTS() {
  const wasPlaying = ttsPlaying;
  ttsPlaying = null;
  if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
    window.speechSynthesis.cancel();
  }
  document.querySelectorAll('.tts-active').forEach(el => el.classList.remove('tts-active'));
  if (wasPlaying) {
    const btnId = wasPlaying === 'L' ? 'btnPlayL' : 'btnPlayR';
    const btn = document.getElementById(btnId);
    if (btn) { btn.textContent = '▶ 読む'; btn.classList.remove('playing'); }
  }
}

// ── 文字サイズ調整 ──
let bodyFs = parseInt(localStorage.getItem('jc_fs') || '15');
if (isNaN(bodyFs)) bodyFs = 15;

function applyFont() {
  document.documentElement.style.setProperty('--body-fs', bodyFs + 'px');
  localStorage.setItem('jc_fs', bodyFs);
}

function adjustFont(dir) {
  bodyFs = Math.max(11, Math.min(26, bodyFs + dir));
  applyFont();
}

// ── 節の検索（例: ヨハネ3:16） ──
function z2h(s) {
  return s.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
}

async function goToRef(side) {
  const input = document.getElementById(side === 'L' ? 'refSearchL' : 'refSearchR');
  let q = input.value.trim();
  if (!q) return;
  q = z2h(q).replace(/：/g, ':');

  // 「書名 章:節」「書名 章」の形式を解析
  const m = q.match(/^(.+?)\s*(\d+)\s*(?:[:章.]\s*(\d+))?\s*節?$/);
  if (!m) { input.style.borderColor = '#e53935'; return; }

  const nameQ = m[1].trim();
  const book = BOOKS.find(b => b.name === nameQ)
            || BOOKS.find(b => b.name.startsWith(nameQ))
            || BOOKS.find(b => b.name.includes(nameQ));
  if (!book) { input.style.borderColor = '#e53935'; return; }

  input.style.borderColor = '';
  const ch = Math.max(1, Math.min(parseInt(m[2]), book.chapters));
  const verse = m[3] ? parseInt(m[3]) : null;

  document.getElementById(side === 'L' ? 'bookSelL' : 'bookSelR').value = book.id;
  buildChapterSelect(side === 'L' ? 'chapSelL' : 'chapSelR', book.id, ch);
  if (side === 'L') { await loadLeft(); } else { await loadRight(); }
  if (verse) scrollToVerse(side === 'L' ? 'panelL' : 'panelR', verse);
}

function scrollToVerse(panelId, v) {
  const panel = document.getElementById(panelId);
  const sup = [...panel.querySelectorAll('sup.verse-num')].find(s => {
    // 合節 (例: "3-4") にも対応: 番号がラベルの範囲に含まれれば一致
    const nums = (s.textContent.match(/\d+/g) || []).map(Number);
    if (nums.length === 0) return false;
    if (nums.length === 1) return nums[0] === v;
    return v >= nums[0] && v <= nums[nums.length - 1];
  });
  if (sup) {
    const para = sup.parentElement;
    const rect = para.getBoundingClientRect();
    const prect = panel.getBoundingClientRect();
    panel.scrollTop += rect.top - prect.top - 40;
    para.classList.add('tts-active');
    setTimeout(() => para.classList.remove('tts-active'), 2500);
  }
}

// ── CMD+C（節番号あり） / CMD+B（節番号なし） ──
document.addEventListener('keydown', async (e) => {
  const isCopy = (e.metaKey || e.ctrlKey) && e.key === 'c';
  const isNoCopy = (e.metaKey || e.ctrlKey) && e.key === 'b';
  if (!isCopy && !isNoCopy) return;

  const selection = window.getSelection();
  if (!selection || selection.isCollapsed) return;

  e.preventDefault();

  const range = selection.getRangeAt(0);
  const fragment = range.cloneContents();
  const tmp = document.createElement('div');
  tmp.appendChild(fragment);

  if (isNoCopy) {
    // 節番号を削除
    tmp.querySelectorAll('sup.verse-num').forEach(el => el.remove());
  }

  let text = tmp.textContent;
  text = text.replace(/[ \t]+/g, ' ').replace(/\n{3,}/g, '\n\n').trim();

  try {
    await navigator.clipboard.writeText(text);
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }

  if (isNoCopy) showCopyToast();
});

function showCopyToast() {
  const t = document.getElementById('copyToast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ── localStorage ──
function saveCredentials(email, password) {
  localStorage.setItem('jbs_email', email);
  localStorage.setItem('jbs_password', password);
}

function loadCredentials() {
  return {
    email:    localStorage.getItem('jbs_email') || '',
    password: localStorage.getItem('jbs_password') || '',
  };
}

function clearCredentials() {
  localStorage.removeItem('jbs_email');
  localStorage.removeItem('jbs_password');
}

// ── 初期化 ──
// URLパラメータ > 前回の位置（localStorage） > デフォルト の優先順で開始位置を決定
window.onload = async () => {
  const params = new URLSearchParams(location.search);

  let bookL = params.get('bookL') || localStorage.getItem('jc_bookL') || 'MAT';
  if (!BOOK_MAP[bookL]) bookL = 'MAT';
  let chL = parseInt(params.get('chapL') || localStorage.getItem('jc_chapL') || '1');
  if (isNaN(chL)) chL = 1;
  chL = Math.max(1, Math.min(chL, BOOK_MAP[bookL].chapters));

  let bookR = params.get('bookR') || localStorage.getItem('jc_bookR') || 'MAT';
  if (!BOOK_MAP[bookR]) bookR = 'MAT';
  let chR = parseInt(params.get('chapR') || localStorage.getItem('jc_chapR') || '1');
  if (isNaN(chR)) chR = 1;
  chR = Math.max(1, Math.min(chR, BOOK_MAP[bookR].chapters));

  document.getElementById('bookSelL').value = bookL;
  document.getElementById('bookSelR').value = bookR;
  buildChapterSelect('chapSelL', bookL, chL);
  buildChapterSelect('chapSelR', bookR, chR);

  applyFont();
  await checkStatus();
  loadLeft();
  loadRight();
};

// 現在位置を保存（次回はここから再開）＋ 共有用にURLへ反映
function savePosition() {
  const bookL = document.getElementById('bookSelL').value;
  const chL   = document.getElementById('chapSelL').value;
  const bookR = document.getElementById('bookSelR').value;
  const chR   = document.getElementById('chapSelR').value;
  localStorage.setItem('jc_bookL', bookL);
  localStorage.setItem('jc_chapL', chL);
  localStorage.setItem('jc_bookR', bookR);
  localStorage.setItem('jc_chapR', chR);
  history.replaceState(null, '', `?bookL=${bookL}&chapL=${chL}&bookR=${bookR}&chapR=${chR}`);
}

async function checkStatus() {
  // デバイス保存の認証情報を常に優先（デバイスごとに独立）
  const creds = loadCredentials();
  if (creds.email && creds.password) {
    const ok = await autoLoginWithCredentials(creds.email, creds.password);
    if (ok) return;
  }
  // localStorage未設定の場合はサーバー状態を確認
  const res = await fetch('/api/status');
  const data = await res.json();
  isLoggedIn = data.logged_in;
  updateStatusBar(data);
}

async function autoLoginWithCredentials(email, password) {
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.ok) {
      isLoggedIn = true;
      updateStatusBar({ logged_in: true, email });
      return true;
    }
  } catch(e) {}
  return false;
}

function updateStatusBar(data) {
  const bar     = document.getElementById('statusBar');
  const btn     = document.getElementById('btnLoginHeader');
  const btnOut  = document.getElementById('btnLogout');
  if (data.logged_in) {
    bar.textContent = `✓ ${data.email}`;
    bar.className = 'status-bar ok';
    btn.textContent = '🔑 IDを変更';
    btn.onclick = openChangeLogin;
    btnOut.style.display = '';
  } else {
    bar.textContent = '未ログイン';
    bar.className = 'status-bar ng';
    btn.textContent = '🔑 ログイン';
    btn.onclick = openLogin;
    btnOut.style.display = 'none';
  }
}

// ── ログイン ──
function openLogin() {
  document.getElementById('loginTitle').textContent = '🔑 聖書協会共同訳 ログイン';
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('loginSuccess').style.display = 'none';
  // localStorageの保存済み認証情報を事前入力
  const creds = loadCredentials();
  document.getElementById('loginEmail').value = creds.email;
  document.getElementById('loginPassword').value = creds.password;
  document.getElementById('rememberMe').checked = true;
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => {
    const pwField = document.getElementById('loginPassword');
    pwField.focus();
    if (!creds.password) document.getElementById('loginEmail').focus();
  }, 100);
}

function openChangeLogin() {
  document.getElementById('loginTitle').textContent = '🔑 ログインIDを変更';
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('loginSuccess').style.display = 'none';
  const creds = loadCredentials();
  document.getElementById('loginEmail').value = creds.email;
  document.getElementById('loginPassword').value = '';
  document.getElementById('rememberMe').checked = true;
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('loginPassword').focus(), 100);
}

function closeLogin() {
  document.getElementById('overlay').classList.remove('open');
}

function closeBgClick(e) {
  if (e.target === document.getElementById('overlay')) closeLogin();
}

async function doLogin() {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const remember = document.getElementById('rememberMe').checked;
  const errDiv   = document.getElementById('loginError');
  const okDiv    = document.getElementById('loginSuccess');
  const btn      = document.getElementById('btnDoLogin');

  errDiv.style.display = 'none';
  okDiv.style.display  = 'none';

  if (!email || !password) {
    errDiv.textContent = 'メールアドレスとパスワードを入力してください';
    errDiv.style.display = 'block'; return;
  }

  btn.textContent = 'ログイン中…'; btn.disabled = true;

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.ok) {
      // 「次回から自動ログイン」が有効なら保存
      if (remember) {
        saveCredentials(email, password);
      } else {
        clearCredentials();
      }
      okDiv.style.display = 'block';
      isLoggedIn = true;
      updateStatusBar({ logged_in: true, email });
      setTimeout(() => {
        closeLogin();
        loadLeft();
        loadRight();
      }, 800);
    } else {
      errDiv.textContent = data.message || 'ログインに失敗しました';
      errDiv.style.display = 'block';
    }
  } catch(e) {
    errDiv.textContent = 'エラー: ' + e.message;
    errDiv.style.display = 'block';
  }

  btn.textContent = 'ログイン'; btn.disabled = false;
}

async function doLogout() {
  stopTTS();
  clearCredentials();
  await fetch('/api/logout', { method: 'POST' });
  isLoggedIn = false;
  updateStatusBar({ logged_in: false, email: '' });
  const msg = `<div class="need-login">
    <h3>🔑 ログインが必要です</h3>
    <p>右上の「ログイン」ボタンからログインしてください</p>
    <button onclick="openLogin()">ログインする</button>
  </div>`;
  document.getElementById('panelL').innerHTML = msg;
  document.getElementById('panelR').innerHTML = msg;
}
</script>
